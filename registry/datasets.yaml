# MoSPI dataset registry (single source of truth for dataset DATA).
# Onboarding a dataset = add one record here (plus its swagger YAML).
# Fields:
#   code                - dataset key (uppercase), as used by the MCP tools
#   name                - human-readable dataset name
#   description         - long description shown by list_datasets
#   use_for             - short keyword phrase for dataset selection
#   domain              - inferred category (free-form grouping label)
#   swagger_file        - swagger spec filename under swagger/ (param validation)
#   data_endpoint       - upstream getData path (from DATASET_SWAGGER)
#   indicator_endpoint  - upstream path used to list indicators (null if bespoke)
#   filter_endpoint     - upstream path used to list filters/metadata (null if bespoke)
#   requires_indicator  - true if indicator_code is mandatory for get_data
#   profile             - indicator-listing shape: simple_list | by_frequency |
#                         base_years | classification_year | bespoke
#   enabled             - whether the dataset is active
#   transforms          - human-readable notes for special handling (may be empty)
datasets:
  - code: PLFS
    name: Periodic Labour Force Survey
    description: '8 indicators covering labor market dynamics: Labour Force Participation Rate (LFPR), Worker Population Ratio (WPR), Unemployment Rate (UR), worker distribution by sector/industry, employment conditions for regular wage employees, and earnings data across three employment types—regular wages, casual labor, and self-employment.'
    use_for: Jobs, unemployment, wages, workforce participation, employment conditions
    domain: labour_employment
    swagger_file: swagger_user_plfs.yaml
    data_endpoint: /api/plfs/getData
    indicator_endpoint: /api/plfs/getIndicatorListByFrequency
    filter_endpoint: /api/plfs/getFilterByIndicatorId
    requires_indicator: true
    profile: by_frequency
    enabled: true
    transforms: []
  - code: CPI
    name: Consumer Price Index
    description: Hierarchical commodity structure (Groups and Items) with base years 2010/2012/2024. Tracks consumer inflation across 600+ items organized into food, fuel, housing, clothing, and miscellaneous categories. Supports state-level analysis at group level and All-India analysis at item level.
    use_for: Retail inflation, price indices, cost of living, commodity price trends
    domain: prices_inflation
    swagger_file: swagger_user_cpi.yaml
    data_endpoint: /api/cpi/getCPIIndex
    indicator_endpoint: /api/cpi/getCpiBaseYear
    filter_endpoint: /api/cpi/getCpiFilterByLevelAndBaseYear
    requires_indicator: false
    profile: base_years
    enabled: true
    transforms:
      - 'get_metadata routes by level: level=''Item'' uses swagger key CPI_ITEM (/api/cpi/getItemIndex), otherwise CPI_GROUP (/api/cpi/getCPIIndex). Both map to DATASET_SWAGGER entry CPI = (swagger_user_cpi.yaml, /api/cpi/getCPIIndex).'
  - code: IIP
    name: Index of Industrial Production
    description: Category-based structure with base years (1993-94, 2004-05, 2011-12) and frequency options (monthly/annual). Measures industrial output across manufacturing, mining, and electricity sectors using use-based classification (basic goods, capital goods, intermediate goods, consumer durables/non-durables).
    use_for: IIP index, industrial production index, manufacturing index, mining/electricity index, growth rates, textiles, metals, vehicles, consumer durables, capital goods
    domain: industry_production
    swagger_file: swagger_user_iip.yaml
    data_endpoint: /api/iip/getIipData
    indicator_endpoint: /api/iip/getIipBaseYear
    filter_endpoint: /api/iip/getIipFilter
    requires_indicator: false
    profile: base_years
    enabled: true
    transforms: []
  - code: ASI
    name: Annual Survey of Industries
    description: '57 indicators providing deep factory-sector analytics: capital structure (fixed/working capital, investments), production metrics (output, inputs, value added), employment details (workers by gender, contract status, mandays), wage components (salaries, bonuses, employer contributions), fuel consumption patterns, and profitability measures. Uses NIC classification across 4 classification years (1987-2008).'
    use_for: 'Factory-level financials: working capital, fixed capital, wages, employment counts, GVA, fuel consumption, profitability (distinct from IIP which covers production indices)'
    domain: industry_production
    swagger_file: swagger_user_asi.yaml
    data_endpoint: /api/asi/getASIData
    indicator_endpoint: /api/asi/getAsiFilter
    filter_endpoint: /api/asi/getAsiFilter
    requires_indicator: false
    profile: classification_year
    enabled: true
    transforms: []
  - code: NAS
    name: National Accounts Statistics
    description: '22 annual + 11 quarterly indicators covering macroeconomic aggregates: GDP and GVA (production approach), consumption (private/government), capital formation (fixed, change in stock, valuables), trade (exports/imports), national income (GNI, disposable income), savings, and growth rates. Both Current and Back series available. Requires base_year (''2022-23'' latest, or ''2011-12'').'
    use_for: GDP, economic growth, national income, sectoral contribution, macro analysis
    domain: national_accounts
    swagger_file: swagger_user_nas.yaml
    data_endpoint: /api/nas/getNASData
    indicator_endpoint: /api/nas/getNasIndicatorList
    filter_endpoint: /api/nas/getNasFilterByIndicatorId
    requires_indicator: true
    profile: base_years
    enabled: true
    transforms: []
  - code: WPI
    name: Wholesale Price Index
    description: 'Hierarchical commodity structure with 1000+ items across 5 levels: Major Groups (Primary articles, Fuel & power, Manufactured products, Food index) → Groups (22) → Sub-groups (90+) → Sub-sub-groups → Items. Tracks wholesale/producer price inflation monthly. Three base years available: 2011-12 (latest, default), 2004-05, and 1993-94.'
    use_for: Wholesale inflation, producer prices, commodity price trends
    domain: prices_inflation
    swagger_file: swagger_user_wpi.yaml
    data_endpoint: /api/wpi/getWpiRecords
    indicator_endpoint: /api/wpi/getWpiBaseYear
    filter_endpoint: /api/wpi/getWpiData
    requires_indicator: false
    profile: base_years
    enabled: true
    transforms: []
  - code: ENERGY
    name: Energy Statistics
    description: 2 indicators (KToE and PetaJoules) measuring energy balance across supply and consumption dimensions. Covers all energy commodities (coal, oil, gas, renewables, electricity) and tracks energy flows through production, transformation, and end-use sectors.
    use_for: Energy production, consumption patterns, fuel mix, sectoral energy use, climate analysis
    domain: energy
    swagger_file: swagger_user_energy.yaml
    data_endpoint: /api/energy/getEnergyRecords
    indicator_endpoint: /api/energy/getEnergyIndicatorList
    filter_endpoint: /api/energy/getEnergyFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms:
      - use_of_energy_balance_code is required for get_metadata/get_data (1=Supply, 2=Consumption); defaults to 1 when omitted.
  - code: AISHE
    name: All India Survey on Higher Education
    description: '9 indicators on higher education: institution counts (universities, colleges), student enrollment (total, by social group, PWD, minority), Gross Enrollment Ratio (GER) by social group, Gender Parity Index (GPI), Pupil-Teacher Ratio (PTR) by mode, and teacher counts. Tracks access and equity in higher education.'
    use_for: Universities, colleges, student enrolment, GER, GPI, higher education statistics
    domain: education
    swagger_file: swagger_user_aishe.yaml
    data_endpoint: /api/aishe/getAisheRecords
    indicator_endpoint: /api/aishe/getAisheIndicatorList
    filter_endpoint: /api/aishe/getAisheFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: ASUSE
    name: Annual Survey of Unincorporated Enterprises
    description: '35 annual + 15 quarterly indicators on informal sector enterprises. Annual (frequency_code=1): establishment counts, ownership patterns, operational characteristics, digital adoption, registration status, worker composition, GVA. Quarterly (frequency_code=2): percentage of market establishments, hired worker establishments, proprietary establishments, worker counts. Use frequency_code=2 for quarterly/recent data.'
    use_for: Informal sector, unincorporated enterprises, small businesses, self-employment, MSME statistics, market establishments
    domain: enterprises
    swagger_file: swagger_user_asuse.yaml
    data_endpoint: /api/asuse/getAsuseRecords
    indicator_endpoint: /api/asuse/getAsuseIndicatorListByFrequency
    filter_endpoint: /api/asuse/getAsuseFilterByIndicatorId
    requires_indicator: true
    profile: by_frequency
    enabled: true
    transforms: []
  - code: GENDER
    name: Gender Statistics
    description: '147 indicators across all domains: demographics (sex ratio, fertility, mortality, life expectancy), health (maternal mortality, immunization, nutrition, NCDs, HIV), education (literacy gaps, enrollment, GER, GPI, dropout rates, teacher ratios), labor (LFPR, WPR, wages, employment status, informal sector), time use patterns, financial inclusion (bank accounts, SHGs, government schemes), political participation (Lok Sabha, assemblies, PRIs, judiciary), leadership (corporate, police, defense, startups, MSMEs), and crimes against women (rape, domestic violence, cybercrimes, suicides).'
    use_for: Gender statistics, women empowerment, sex ratio, female literacy, women in workforce, crimes against women
    domain: gender
    swagger_file: swagger_user_gender.yaml
    data_endpoint: /api/gender/getGenderRecords
    indicator_endpoint: /api/gender/getGenderIndicatorList
    filter_endpoint: /api/gender/getGenderFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: NFHS
    name: National Family Health Survey
    description: '21 indicators on health and demographics: population profile, fertility (TFR, age-specific, adolescent), mortality (infant, child), family planning (usage, unmet need, quality), maternal/delivery care, child health (vaccinations, disease treatment, feeding, nutrition), adult nutrition (BMI, anaemia), chronic conditions (diabetes, hypertension), cancer screening, HIV awareness, women''s empowerment, and gender-based violence.'
    use_for: Family health, fertility rates, infant mortality, maternal care, child immunization, nutrition, family planning, women's health, gender-based violence
    domain: health
    swagger_file: swagger_user_nfhs.yaml
    data_endpoint: /api/nfhs/getNfhsRecords
    indicator_endpoint: /api/nfhs/getNfhsIndicatorList
    filter_endpoint: /api/nfhs/getNfhsFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: ENVSTATS
    name: Environment Statistics
    description: '124 indicators covering: climate (temperature, rainfall, heat/cold waves, cyclones), water resources (wetlands, watersheds, rivers, groundwater, reservoirs, water quality), land (soil types, degradation, land use/cover), forests (area, cover, fire, carbon stock, tree cover), biodiversity (faunal diversity including global species counts by phylum—mammals, birds, reptiles, fish, etc., plant status), minerals, energy (coal/lignite reserves, power generation), agriculture (crops, fertilizers, pesticides, organic farming, livestock), pollution (air quality, noise, industrial clusters), waste (municipal, hazardous, biomedical, sewage), natural disasters (earthquakes, extreme events, deaths, government expenditure), water/sanitation access, transport, disease outbreaks, and environmental expenditure (government + corporate CSR).'
    use_for: Climate, biodiversity, species counts, water resources, forests, land use, pollution, waste, natural disasters, environmental health
    domain: environment
    swagger_file: swagger_user_envstats.yaml
    data_endpoint: /api/env/getEnvStatsRecords
    indicator_endpoint: /api/env/getEnvStatsIndicatorList
    filter_endpoint: /api/env/getEnvStatsFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: RBI
    name: RBI Statistics
    description: '39 indicators on external sector: foreign trade (direction by country, commodity exports/imports in USD/INR), balance of payments (overall BoP, invisibles, key components—quarterly and annual), external debt, forex reserves, NRI deposits, and exchange rates (155 currencies, SDR, monthly averages, highs/lows, forward premia). Comprehensive for trade and currency analysis.'
    use_for: Foreign trade, exports, imports, balance of payments, forex reserves, exchange rates, external debt, NRI deposits
    domain: external_sector
    swagger_file: swagger_user_rbi.yaml
    data_endpoint: /api/rbi/getRbiRecords
    indicator_endpoint: /api/rbi/getRbiIndicatorList
    filter_endpoint: /api/rbi/getRbiMetaData
    requires_indicator: false
    profile: simple_list
    enabled: true
    transforms:
      - In get_metadata the public indicator_code parameter is renamed to sub_indicator_code internally (client.get_rbi_filters takes sub_indicator_code).
  - code: NSS77
    name: NSS77 (77th Round - Land & Livestock)
    description: '33 indicators on agricultural households: land ownership and possession (by size class, leasing patterns), livestock holdings, farm economics (income, expenses, crop production, GVA), crop marketing (disposal agencies, MSP awareness, satisfaction levels), input usage (seeds, farming resources), agricultural loans and insurance (coverage, crop loss, claim status). Comprehensive rural livelihoods data.'
    use_for: Agricultural households, land ownership, livestock, farm income, crop production, agricultural loans, crop insurance, MSP awareness
    domain: agriculture_rural
    swagger_file: swagger_user_nss77.yaml
    data_endpoint: /api/nss-77/getNss77Records
    indicator_endpoint: /api/nss-77/getIndicatorList
    filter_endpoint: /api/nss-77/getFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: NSS78
    name: NSS78 (78th Round - Living Conditions)
    description: '14 indicators on household living standards: drinking water access (improved sources, piped supply), sanitation (exclusive latrines, handwashing facilities), digital connectivity (mobile phones, broadband, mass media), transport access, household assets, sources of finance, and migration patterns (reasons, income changes, usual residence). From 2020-21 survey.'
    use_for: Household amenities, drinking water, sanitation, digital connectivity, migration, household assets, living standards
    domain: household_living
    swagger_file: swagger_user_nss78.yaml
    data_endpoint: /api/nss-78/getNss78Records
    indicator_endpoint: /api/nss-78/getIndicatorList
    filter_endpoint: /api/nss-78/getFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: NSS76
    name: NSS76 (76th Round - Disability + Housing & Drinking Water)
    description: '25 indicators from NSS 76th Round in two modules. Disability module (survey_code=1, indicators 1-13): prevalence of disability, literacy and education among persons with disability, employment, care arrangements, and receipt of aid/help by state/UT. Housing & water module (survey_code=2, indicators 14-26): principal and supplementary sources of drinking water, sufficiency of supply, treatment methods, housing characteristics (floor area, living rooms, plinth level, approach road, separate kitchen, floors), latrine use, and flood experience.'
    use_for: Disability statistics, persons with disability literacy and education, care givers, aid and help for disabled, drinking water sources, water treatment, housing quality, latrine access, household amenities, flood experience, NSS 76th round
    domain: disability_housing
    swagger_file: swagger_user_nss76.yaml
    data_endpoint: /api/nss-76/getNss76Records
    indicator_endpoint: /api/nss-76/getIndicatorList
    filter_endpoint: /api/nss-76/getNSS76FilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms:
      - survey_code is auto-derived from indicator_code (1-13 -> 1 Disability, 14-26 -> 2 Housing & drinking water) in client.get_nss76_filters; survey_code is required by the data API and must be passed in get_data filters.
  - code: NSS75E
    name: NSS75E (75th Round - Education / Social Consumption on Education)
    description: '13 indicators from NSS 75th Round Education module (survey_code=2, indicators 43-55): literacy rate, educational attainment, mean years of schooling, student attendance distribution, Gross and Net Attendance Ratios (GAR/NAR), course-type distribution, average student expenditure on basic courses (general and technical/professional, by expenditure item), and household computer/internet access.'
    use_for: Literacy rate, educational attainment, years of schooling, GAR, NAR, student attendance, education expenditure, general vs technical courses, household internet and computer access, NSS 75th round education
    domain: education
    swagger_file: swagger_user_nss75e.yaml
    data_endpoint: /api/nss-75/getNSS75Records
    indicator_endpoint: /api/nss-75/getIndicatorList
    filter_endpoint: /api/nss-75/getNSS75FilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms:
      - survey_code is auto-derived from indicator_code (43-55 -> always 2, Education module) in client.get_nss75e_filters; survey_code is required by the data API and must be passed in get_data filters.
  - code: NSS79
    name: NSS79 (79th Round - CAMS + AYUSH)
    description: '35 indicators from two modules of NSS 79th Round. CAMS module (indicators 1-28): education (literacy, numeracy, mean years of schooling, primary enrolment, secondary attainment, out-of-school children, S&T graduates, youth in training, NEET youth), health expenditure (hospitalised and non-hospitalised, out-of-pocket), financial inclusion (bank accounts, borrowers), digital literacy (mobile/internet usage and ability, 4G coverage, file sharing, online banking), and household living conditions (assets, clean fuel, drinking water, sanitation, birth registration, transport access). AYUSH module (indicators 29-35): awareness of AYUSH systems per 1000 persons, usage in last 365 days, treatment type breakdown, household-level awareness and knowledge of AYUSH therapy, average expenditure per person availing AYUSH treatment, and household reasons for using AYUSH.'
    use_for: Literacy, school enrolment, NEET youth, health expenditure, out-of-pocket costs, financial inclusion, mobile/internet usage, digital skills, 4G coverage, household assets, AYUSH awareness, AYUSH usage, traditional medicine, alternative treatment expenditure, CAMS survey
    domain: education_health
    swagger_file: swagger_user_nss79.yaml
    data_endpoint: /api/nss-79/getNSS79Records
    indicator_endpoint: /api/nss-79/getNSS79IndicatorList
    filter_endpoint: /api/nss-79/getNSS79FilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: CPIALRL
    name: CPI for Agricultural/Rural Labourers
    description: '2 indicators: General Index and Group Index for two worker categories—Agricultural Labourers (AL) and Rural Labourers (RL). Separate inflation series measuring cost of living for India''s most vulnerable rural workforce segments.'
    use_for: Rural inflation, agricultural labourer cost of living, rural wage indexing
    domain: prices_inflation
    swagger_file: swagger_user_cpialrl.yaml
    data_endpoint: /api/cpialrl/getCpialrlRecords
    indicator_endpoint: /api/cpialrl/getCpialrlIndicatorList
    filter_endpoint: /api/cpialrl/getCpialrlFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: HCES
    name: Household Consumption Expenditure Survey
    description: '9 indicators analyzing consumption patterns: MPCE (overall and across 12 fractile classes), expenditure by broad categories (food/non-food), quantity and value of consumption, breakdowns by household type and social group, plus Gini coefficient for inequality measurement. Critical for poverty and welfare analysis.'
    use_for: Consumer spending, poverty analysis, inequality (Gini), household expenditure patterns
    domain: consumption_welfare
    swagger_file: swagger_user_hces.yaml
    data_endpoint: /api/hces/getHcesRecords
    indicator_endpoint: /api/hces/getHcesIndicatorList
    filter_endpoint: /api/hces/getHcesFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: TUS
    name: Time Use Survey
    description: '41 indicators measuring time allocation: participation rates and minutes spent in paid work, unpaid domestic/care work, and other activities. Breakdowns by major/non-major activity status, marital status, education level, UMPCE quintiles, social groups, age groups, and SNA/Non-SNA classification. Reveals gender time gaps in unpaid work burden.'
    use_for: Time allocation, unpaid work, gender time gaps, work-life balance, care economy
    domain: time_use
    swagger_file: swagger_user_tus.yaml
    data_endpoint: /api/tus/getTusRecords
    indicator_endpoint: /api/tus/getTusIndicatorList
    filter_endpoint: /api/tus/getTusFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: EC
    name: Economic Census
    description: '3 indicators (EC6, EC5, EC4) providing district-wise establishment and worker counts from India''s Economic Censuses. EC6 (2013-14): 36 States/UTs, 24 activity sectors. EC5 (2005): 35 States/UTs, 313 NIC-based activity codes. EC4 (1998): 35 States/UTs, 18 activity sectors. Filters: state, activity type, nature of operation, source of finance, ownership type.'
    use_for: Establishments, enterprises, economic census, district-wise business count, workers, employment by sector, ownership
    domain: enterprises
    swagger_file: swagger_user_ec.yaml
    data_endpoint: /EC/filterDistrict6
    indicator_endpoint: null
    filter_endpoint: null
    requires_indicator: true
    profile: bespoke
    enabled: false
    transforms:
      - Bespoke dataset. indicator_code 1=EC6, 2=EC5, 3=EC4 maps to versioned swagger paths and upstream endpoints (filterDistrict6/5/4 for ranking, submitForm6/5/4 for detail). Indicators come from a hardcoded list and filters are read from swagger_user_ec.yaml rather than an /api endpoint. data_endpoint /EC/filterDistrict6 is the ranking endpoint for EC6.
  - code: UDISE
    name: UDISE+ (Unified District Information System for Education)
    description: '46 indicators on school education across India (2018-19 to 2024-25). Overview (1-9): total schools, enrolments, teachers, percentage shares by category/level, PTR, average teachers/enrolments per school. Special focus (10-15): zero-enrolment schools, single-teacher schools, enrolment brackets, proportion by level. Schools (16, 18-20): by infrastructure facility, by level of education, by management and school category, AWC/pre-primary sections. Teachers (21-26): total by management, by gender and class taught, PTR by level, percentage trained, percentage professionally qualified. Enrolment (28-38): total students, CWSN, pre-school experience, GER, NER, ANER, ASER by age group, GPI of GER, OBC/Muslim minority/all minority enrolment percentages. Transition metrics (39-43): promotion, repetition, dropout, transition, retention rates. Facilities (45-49): drinking water (by source type), library books per school, educational parameters by management, computers and digital initiatives (by sub-indicator), ICT labs.'
    use_for: Schools, enrolment, dropout rates, teachers, pupil-teacher ratio, GER, NER, GPI, CWSN, school infrastructure, ICT labs, drinking water in schools, minority enrolment, OBC enrolment, trained teachers, school education statistics
    domain: education
    swagger_file: swagger_user_udise.yaml
    data_endpoint: /api/udise/getUdiseRecords
    indicator_endpoint: /api/udise/getIndicatorList
    filter_endpoint: /api/udise/getUdiseFilterByIndicatorId
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms: []
  - code: MNRE
    name: Renewable Energy (Ministry of New and Renewable Energy)
    description: '5 indicators on state-wise monthly installed renewable energy capacity (MW): 1=Solar Power (5 categories: ground-mounted, rooftop, hybrid, off-grid/KUSUM, total), 2=Wind Power (no categories), 3=Hydro Power (small, large), 4=Bio Power (waste-to-energy, biomass cogeneration, bagasse, off-grid, total), 5=Total Power (aggregate of all renewables). Coverage from 2020 onwards, 36 states/UTs plus All India, monthly granularity.'
    use_for: Renewable energy capacity, solar power installed capacity, wind power, hydro power, bio power, rooftop solar, KUSUM, biomass, state-wise renewable energy, MNRE statistics, clean energy, green energy capacity
    domain: energy
    swagger_file: swagger_user_mnre.yaml
    data_endpoint: /api/mnre/getDataByEnergy
    indicator_endpoint: /api/mnre/getTypeOfRenewableEnergy
    filter_endpoint: /api/mnre/getFilterByEnergy
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms:
      - indicator_code maps to type_of_renewable_energy_code in the data API. Solar(1)/Hydro(3)/Bio(4) have category_code values; Wind(2)/Total(5) have none.
  - code: NSS80
    name: NSS80 (80th Round - Telecom (CMST) + Education (CMSE))
    description: '38 indicators from two modules of NSS 80th Round. Telecom (CMST) module (Comprehensive Modular Survey: Telecom, indicators 1-20): mobile phone ownership and usage in last 3 months, internet usage and frequency, type of portable device and network used, ability to send/receive email and attachments, ability to copy-paste, create electronic documents and presentations, online banking ability and modes of transaction, ability to report cybercrime, household possession of landline/mobile/optical fiber, household internet facility by service type, reasons for not having internet, and household online purchases by type of goods. Education (CMSE) module (Comprehensive Modular Survey: Education, indicators 23-42): covers student enrolment patterns, type of school and level of enrolment, expenditure on school education including course fees, books, uniforms, transport and other related expenses, participation in private coaching and associated expenditure, household spending on education, sources of funding for educational expenses, distribution of students across education categories, and household support for school education.'
    use_for: Mobile phone usage, internet access, digital literacy, online banking, cybercrime awareness, e-commerce participation, school enrolment, education expenditure, private coaching, household telecom connectivity, online shopping, school expenditure, course fees, books, uniforms, transport, private tuition, education expenditure by household, CMST survey, CMSE survey, comprehensive modular survey, household support for education
    domain: telecom_education
    swagger_file: swagger_user_nss80.yaml
    data_endpoint: /api/nss-80/getNSS80Records
    indicator_endpoint: /api/nss-80/getIndicatorList
    filter_endpoint: /api/nss-80/getFilterBySurveryAndIndicator
    requires_indicator: true
    profile: simple_list
    enabled: true
    transforms:
      - survey_code is auto-derived from indicator_code (1-20 -> 1 CMST Telecom, 23-42 -> 2 CMSE Education) in client.get_nss80_filters; survey_code is required by the data API and must be passed in get_data filters.
